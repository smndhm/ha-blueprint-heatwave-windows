blueprint:
  name: "Fenêtres Canicule / Heatwave Windows"
  description: >
    Envoie une notification pour ouvrir ou fermer les fenêtres en période de
    canicule, en comparant les températures extérieures et intérieures.

    Sends a notification to open or close windows during a heatwave,
    by comparing indoor and outdoor temperatures.
  domain: automation
  input:
    capteurs_exterieurs:
      name: Capteurs extérieurs / Outdoor sensors
      description: Sélectionne tous tes capteurs de température extérieurs / Select all outdoor temperature sensors
      selector:
        entity:
          multiple: true
          device_class: temperature
    capteurs_interieurs:
      name: Capteurs intérieurs / Indoor sensors
      description: Sélectionne tous tes capteurs de température intérieurs / Select all indoor temperature sensors
      selector:
        entity:
          multiple: true
          device_class: temperature
    services_notification:
      name: Service(s) de notification / Notification service(s)
      description: >
        Service(s) de notification séparés par des virgules.
        Ex : notify.mobile_app_pixel_7, notify.mobile_app_iphone_de_marie

        Comma-separated notification services.
        E.g.: notify.mobile_app_pixel_7, notify.mobile_app_iphone_de_marie
      selector:
        text:
    delai_minutes:
      name: Délai / Delay (minutes)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
    boolean_fenetres:
      name: Indicateur état fenêtres / Window state indicator
      description: >
        (Optionnel) input_boolean mis à jour à chaque déclenchement : on = ouvrir, off = fermer.
        Permet d'afficher l'état sur le dashboard et de conserver un historique.

        (Optional) input_boolean updated on each trigger: on = open, off = close.
        Useful to display state on dashboard and keep history.
      default: ""
      selector:
        entity:
          domain: input_boolean
    langue:
      name: Langue / Language
      default: "fr"
      selector:
        select:
          options:
            - label: Français
              value: "fr"
            - label: English
              value: "en"

trigger:
  - platform: template
    value_template: >
      {% set temps_ext = expand(capteurs_exterieurs) | map(attribute='state') | map('float', none) | reject('none') | list %}
      {% set temps_int = expand(capteurs_interieurs) | map(attribute='state') | map('float', none) | reject('none') | list %}
      {% if temps_ext | length > 0 and temps_int | length > 0 %}
        {{ temps_ext | max < temps_int | min }}
      {% else %}
        false
      {% endif %}
    for:
      minutes: !input delai_minutes
    id: ouvrir
  - platform: template
    value_template: >
      {% set temps_ext = expand(capteurs_exterieurs) | map(attribute='state') | map('float', none) | reject('none') | list %}
      {% set temps_int = expand(capteurs_interieurs) | map(attribute='state') | map('float', none) | reject('none') | list %}
      {% if temps_ext | length > 0 and temps_int | length > 0 %}
        {{ temps_ext | max > temps_int | min }}
      {% else %}
        false
      {% endif %}
    for:
      minutes: !input delai_minutes
    id: fermer

action:
  - variables:
      langue: !input langue
      boolean_fenetres: !input boolean_fenetres
      temps_ext: >
        {{ expand(capteurs_exterieurs) | map(attribute='state') | map('float', none) | reject('none') | list }}
      temps_int: >
        {{ expand(capteurs_interieurs) | map(attribute='state') | map('float', none) | reject('none') | list }}
      temp_max_ext: "{{ temps_ext | max | round(1) }}"
      temp_min_int: "{{ temps_int | min | round(1) }}"
      titre_ouvrir: "{% if langue == 'fr' %}🪟 Ouvrez les fenêtres !{% else %}🪟 Open the windows!{% endif %}"
      message_ouvrir: >
        {% if langue == 'fr' %}
          Il fait plus frais dehors (max {{ temp_max_ext }}°C) que dedans (min {{ temp_min_int }}°C). C'est le moment de ventiler !
        {% else %}
          It's cooler outside (max {{ temp_max_ext }}°C) than inside (min {{ temp_min_int }}°C). Time to ventilate!
        {% endif %}
      titre_fermer: "{% if langue == 'fr' %}🪟 Fermez les fenêtres !{% else %}🪟 Close the windows!{% endif %}"
      message_fermer: >
        {% if langue == 'fr' %}
          Il fait plus chaud dehors (max {{ temp_max_ext }}°C) que dedans (min {{ temp_min_int }}°C). Fermez pour garder la fraîcheur !
        {% else %}
          It's warmer outside (max {{ temp_max_ext }}°C) than inside (min {{ temp_min_int }}°C). Close to keep the cool air in!
        {% endif %}
  - variables:
      services_raw: !input services_notification
      services: "{{ services_raw.split(',') | map('trim') | list }}"
      titre: >
        {% if trigger.id == 'ouvrir' %}{{ titre_ouvrir }}{% else %}{{ titre_fermer }}{% endif %}
      message: >
        {% if trigger.id == 'ouvrir' %}{{ message_ouvrir }}{% else %}{{ message_fermer }}{% endif %}
  - if:
      - condition: template
        value_template: "{{ boolean_fenetres != '' }}"
    then:
      - service: "input_boolean.turn_{{ 'on' if trigger.id == 'ouvrir' else 'off' }}"
        target:
          entity_id: "{{ boolean_fenetres }}"
  - repeat:
      for_each: "{{ services }}"
      sequence:
        - service: "{{ repeat.item }}"
          data:
            title: "{{ titre }}"
            message: "{{ message }}"
